version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_HOST_PORT}:5000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
  
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_HOST_PORT}
    depends_on:
      - backend

  kafka:
    image: apache/kafka:latest
    container_name : control-tower-kafka
  
  postgresql:
    image: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
