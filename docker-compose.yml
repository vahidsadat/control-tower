version: '3.8'

services:
  postgres-db:
    image: postgres:17-alpine
    container_name: control-tower-postgres
    environment:
       POSTGRES_USER: ${POSTGRES_USER}
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
       POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - control-network

    
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: control-tower-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}?schema=public
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - postgres-db
    networks:
      - control-network
  
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    depends_on:
      - backend-api
    
volumes:
  postgres_data:
networks:
  control-network:
     - driver: bridge